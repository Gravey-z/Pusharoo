<app-page-shell title="Deploy Contract">
  <a actions class="secondary-button" [routerLink]="['/projects', projectId]">Back</a>

  @if (overview) {
    @if (artifacts.length) {
      <form class="deployment-form" (ngSubmit)="save()">
        <label>
          <span>Artifact version</span>
          <select name="artifactId" [(ngModel)]="artifactId">
            @for (artifact of artifacts; track artifact.id) {
              <option [value]="artifact.id">
                {{ artifact.version }} - {{ artifact.contractName }}
              </option>
            }
          </select>
        </label>

        <label>
          <span>Network</span>
          <input type="text" name="network" [value]="walletNetwork() || 'Connect wallet first'" readonly />
        </label>

        <label>
          <span>Deployed by</span>
          <input type="text" name="deployedBy" [value]="walletAddress() || 'Connect wallet first'" readonly />
        </label>

        <label>
          <span>Contract hash</span>
          <input type="text" name="contractHash" [(ngModel)]="contractHash" placeholder="Optional, if already known" />
        </label>

        <label>
          <span>Notes</span>
          <textarea name="notes" rows="4" [(ngModel)]="notes"></textarea>
        </label>

        @if (deployStatus) {
          <p class="form-status">{{ deployStatus }}</p>
        }

        @if (errorMessage) {
          <p class="form-error">{{ errorMessage }}</p>
        }

        <button class="primary-button" type="submit" [disabled]="isSaving">
          {{ isSaving ? 'Deploying...' : 'Deploy Contract' }}
        </button>
      </form>
    } @else {
      <section class="empty-state">
        <strong>No artifacts yet</strong>
        <p>Upload an artifact before adding a deployment.</p>
      </section>
    }
  } @else {
    <p class="missing">Project not found.</p>
  }
</app-page-shell>
